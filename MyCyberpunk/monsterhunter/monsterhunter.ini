[Rainmeter]
Update=60
MouseOverAction=MouseActionCursorName=Busy

[Variables]
Step=1

[MeasureAnimation]
Measure=CALC
Formula=(( MeasureAnimation + #Step# ) % 8 )
Paused=1
IfCondition=((MeasureAnimation=0)||(MeasureAnimation=7))
IfConditionMode=((MeasureAnimation=0)||(MeasureAnimation=7))
IfTrueAction=[!PauseMeasure MeasureAnimation]
DynamicVariables=1

[MeterAnimation]
Meter=BITMAP
MeasureName=MeasureAnimation
BitmapImage=#@#Images\monsterhunter.png
BitmapFrames=8
BitmapExtend=1
MouseOverAction=[!SetVariable Step "1"][!UnpauseMeasure "MeasureAnimation"][Play "#@#Sounds\Monster Hunter.wav"][!SetOption "Title" FontColor "255,255,255,255"]
MouseLeaveAction=[!SetVariable Step "-1"][!UnpauseMeasure "MeasureAnimation"][!SetOption "Title" FontColor "255,255,255,0"]
LeftMouseUpAction=["C:\Users\markj\Desktop\MonsterHunterWorld.url"]

[Title]
Meter=String
Text=Monster Hunter World: Iceborne
FontFace=iFlash 502
FontColor=255,255,255,0
FontSize=16
W=200
X=13
Y=67
DynamicVariables=1
AntiAlias=1
StringAlign=Left
ClipString=2