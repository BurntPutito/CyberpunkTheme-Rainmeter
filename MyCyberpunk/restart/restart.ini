[Rainmeter]
Update=60
MouseOverAction=MouseActionCursorName=Busy

[Variables]
Step=1

[MeasureAnimation]
Measure=CALC
Formula=(( MeasureAnimation + #Step# ) % 13 )
Paused=1
IfCondition=((MeasureAnimation=0)||(MeasureAnimation=12))
IfConditionMode=1
DynamicVariables=1

[MeterAnimation]
Meter=BITMAP
MeasureName=MeasureAnimation
BitmapImage=#@#Images\RestartPC.png
BitmapFrames=13
BitmapExtend=1
MouseOverAction=[!SetVariable Step "1"][!UnpauseMeasure "MeasureAnimation"][Play "#@#Sounds\blipSelect.wav"][!SetOption "Title" FontColor "255,255,255,255"]
MouseLeaveAction=[!SetVariable Step "-1"][!UnpauseMeasure "MeasureAnimation"][!SetOption "Title" FontColor "255,255,255,0"]
LeftMouseDoubleClickAction=[%windir%\System32\shutdown.exe -r -t 00][!SetOption MeasureAnimation Formula "(( MeasureAnimation + #Step# ) % 1 )"][!SetOption MeasureAnimation IfCondition "((MeasureAnimation=0)||(MeasureAnimation=0))"][!SetOption MeterAnimation BitmapFrames "1"][!SetOption MeterAnimation BItmapImage "#@#Images\RestartPC(pushed).png"][!SetOption "Title" FontColor "255,255,255,0"][!Redraw]

[Title]
Meter=String
Text=Restart
FontFace=iFlash 502
FontColor=255,255,255,0
FontSize=16
W=100
X=1
Y=-5
DynamicVariables=1
AntiAlias=1
ClipString=2