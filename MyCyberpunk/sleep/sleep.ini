[Rainmeter]
Update=60
MouseOverAction=MouseActionCursorName=Busy

[Variables]
Step=1

[MeasureAnimation]
Measure=CALC
Formula=(( MeasureAnimation + #Step# ) % 6 )
Paused=1
IfCondition=((MeasureAnimation=0)||(MeasureAnimation=5))
IfTrueAction=[!PauseMeasure MeasureAnimation]
DynamicVariables=1

[MeterAnimation]
Meter=BITMAP
MeasureName=MeasureAnimation
BitmapImage=#@#Images\sleepANIM.png
BitmapFrames=6
BitMapExtend=1
MouseOverAction=[Play "#@#Sounds\blipSelect.wav"][!SetOption Title FOntColor 255,255,255,255]
MouseLeaveAction=[!SetOption Title FontColor 255,255,255,0]
LeftMouseUpAction=[Play "#@#Sounds/sleepSFX.wav"][!SetVariable Step "1"][!UnpauseMeasure "MeasureAnimation"][%windir%\System32\rundll32.exe powrprof.dll,SetSuspendState 0,1,0][!SetOption Title FontColor 255,255,255,0]

[Title]
Meter=String
Text=Sleep?
FontSize=16
FontColor=255,255,255,0
FontFace=iFlash 502
W=200
X=30
Y=110
StringAlign=Left
