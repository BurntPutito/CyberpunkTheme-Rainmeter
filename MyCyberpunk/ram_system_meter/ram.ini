[Rainmeter]
Update=60
MouseOverAction=MouseActionCursorName=Busy

[Variables]
Step=1

[MeasureAnimation]
Measure=CALC
Formula=(( MeasureAnimation + #Step# ) % 11 )
Paused=1
IfCondition=((MeasureAnimation=0)||(MeasureAnimation=10))
IfConditionMode=1
DynamicVariables=1

[MeterAnimation]
Meter=BITMAP
MeasureName=MeasureAnimation
BitmapImage=#@#Images\rambackground.png
BitmapFrames=11
BitmapExtend=1
MouseOverAction=[!SetVariable Step "1"][!UnpauseMeasure "MeasureAnimation"][Play "#@#Sounds\CPU&RAMsfx.wav"]
MouseLeaveAction=[!SetVariable Step "-1"][!UnpauseMeasure "MeasureAnimation"][PlayStop]
LeftMouseUpAction=[%windir%\system32\taskmgr.exe /7]
SolidColor=0,0,0,1
DynamicWindowSize=1
AccurateText=1
H=150

[TITLE]
Meter=String
Text=RAM
FontFace=iFlash 502
FontSize=13
StringStyle=Bold
x=7
y=82
FontColor=255,255,255
AutoScale=1
AntiAlias=1

[MeasurePhysMemTotal]
Measure=PhysicalMemory
Total=1
UpdateDivider=3600

[MeasurePhysMemUsed]
Measure=PhysicalMemory
UpdateDivider=2

[MeasurePhysMemFree]
Measure=PhysicalMemory
UpdateDivider=2

[MeterText]
Meter=String
MeasureName=MeasurePhysMemTotal
MeasureName2=MeasurePhysMemUsed
MeasureName3=MeasurePhysMemFree
FontColor=255,255,255
FontFace=iFlash 502
FontSize=16
AntiAlias=1
StringStyle=Bold
NumOfDecimals=1
AutoScale=1
Text="%3B"
X=104
Y=62