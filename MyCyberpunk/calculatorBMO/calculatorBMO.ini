[Variables]
Step=1

[MeasureAnimation]
Measure=CALC
Formula=(( MeasureAnimation + #Step# ) % 18 )
Paused=1
IfCondition=((MeasureAnimation=0)||(MeasureAnimation=17))
IfTrueAction=[!PauseMeasure MeasureAnimation]
DynamicVariables=1

[MeterAnimation]
Meter=BITMAP
MeasureName=MeasureAnimation
BitmapImage=#@#Images\BMO.png
BitmapFrames=18
BitmapExtend=1
MouseOverAction=[!SetVariable Step "1"][!UnpauseMeasure "MeasureAnimation"][Play #@#Sounds\HelloThere.wav]
MouseLeaveAction=[PlayStop][!Refresh]
LeftMouseUpAction=["C:\Windows\System32\calc.exe"]


[Rainmeter]
Update=60
MouseOverAction=MouseActionCursorName=Busy

