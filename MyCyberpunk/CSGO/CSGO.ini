[Rainmeter]
Update=60
MouseOverAction=MouseActionCursorName=Busy

[Variables]
Step=1

[MeasureAnimation]
Measure=CALC
Formula=(( MeasureAnimation + #Step# ) % 8 )
Paused=1
IfCondition=((MeasureAnimation=0)||(MeasureAnimation=7))
IfConditionMode=1
DynamicVariables=1

[MeterAnimation]
Meter=BITMAP
MeasureName=MeasureAnimation
BitmapImage=#@#Images\CSGO.png
BitmapFrames=8
BitmapExtend=1
MouseOverAction=[!SetVariable Step "1"][!UnpauseMeasure "MeasureAnimation"][Play "#@#Sounds\CSGO.wav"][!SetOption "Title" FontColor "255,255,255,255"]
MouseLeaveAction=[!SetVariable Step "-1"][!UnpauseMeasure "MeasureAnimation"][!SetOption "Title" FontColor "255,255,255,0"]
LeftMouseUpAction=["C:\Users\markj\Desktop\Counter-Strike Global Offensive.url"]

[Title]
Meter=String
Text=CSGO
FontFace=iFlash 502
FontColor=255,255,255,0
FontSize=16
W=100
X=13
Y=67
DynamicVariables=1
AntiAlias=1
StringAlign=Left
ClipString=2