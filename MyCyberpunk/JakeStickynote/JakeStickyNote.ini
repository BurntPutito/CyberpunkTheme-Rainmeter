[Variables]
Step=1

[MeasureAnimation]
Measure=CALC
Formula=(( MeasureAnimation + #Step# ) % 20 )
Paused=1
IfCondition=((MeasureAnimation=0)||(MeasureAnimation=19))
IfTrueAction=[!PauseMeasure MeasureAnimation]
DynamicVariables=1

[MeterAnimation]
Meter=BITMAP
MeasureName=MeasureAnimation
BitmapImage=#@#Images\jakeNotes.png
Y=-265
BitmapFrames=20
BitmapExtend=1
MouseOverAction=[Play #@#Sounds\jakestretch.wav][!SetVariable Step "1"][!UnpauseMeasure "MeasureAnimation"]
MouseLeaveAction=[PlayStop][!SetVariable Step "-1"][!UnpauseMeasure "MeasureAnimation"]
LeftMouseUpAction=["C:\Users\markj\Desktop\Sticky Notes.lnk"]


[Rainmeter]
Update=60
MouseOverAction=MouseActionCursorName=Busy
