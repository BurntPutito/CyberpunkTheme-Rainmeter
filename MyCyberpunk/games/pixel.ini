[Rainmeter]
Update=60
MouseOverAction=MouseActionCursorName=Busy

[Variables]
Step=1

[MeasureAnimation]
Measure=CALC
Formula=(( MeasureAnimation + #Step# ) % 24 )
Paused=1
IfCondition=((MeasureAnimation=0)||(MeasureAnimation=23))
IfTrueAction=[!PauseMeasure MeasureAnimation]
DynamicVariables=1

[MeterAnimation]
Meter=BITMAP
MeasureName=MeasureAnimation
BitmapImage=#@#Images\gameANIM.png
BitmapFrames=24
BitmapExtend=12
MouseOverAction=[!SetVariable Step "1"][!UnpauseMeasure "MeasureAnimation"][Play "#@#Sounds\gameselect.wav"][!SetOption Title FontColor 255,255,255,255]
MouseLeaveAction=[!SetVariable Step "-1"][!UnpauseMeasure "MeasureAnimation"][Play "#@#Sounds\bump.wav"][!SetOption Title FontColor 255,255,255,0]
LeftMouseUpAction=["D:\ShortcutGames"]

[Title]
Meter=String
Text=Games
FontColor=255,255,255,0
FontSize=16
FontFace=iFlash 502
W=100
X=13
Y=67
StringAlign=Left



