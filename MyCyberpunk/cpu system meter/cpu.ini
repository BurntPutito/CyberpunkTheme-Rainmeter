[Rainmeter]
Update=60
MouseOverAction=MouseActionCursorName=Busy

[Variables]
Step=1

[MeasureAnimation]
Measure=CALC
Formula=(( MeasureAnimation + #Step# ) % 11 )
Paused=1
IfCondition=((MeasureAnimation=0)||(MeasureAnimation=10))
IfTrueAction=[!PauseMeasure MeasureAnimation]
DynamicVariables=1

[MeterAnimation]
SolidColor=0,0,0,1
Meter=BITMAP
MeasureName=MeasureAnimation
BitmapImage=#@#Images\cpubackgroundtry.png
BitmapFrames=11
BitmapExtend=1
MouseOverAction=[!SetVariable Step "1"][!UnpauseMeasure "MeasureAnimation"][Play "#@#Sounds\iconselectWAV.wav"][Play "#@#Sounds\glitch.wav"][!Redraw]
MouseLeaveAction=[!SetVariable Step "-1"][!UnpauseMeasure "MeasureAnimation"][PlayStop][!Update][!Redraw]
LeftMouseUpAction=[%windir%\system32\taskmgr.exe /7]

[MeasureCPU]
Measure=CPU
IfAboveValue=90
IfAboveAction=[!SetOption MeterCPUPercent FontColor d62828][!Redraw]
IfBelowValue=89
IfBelowAction=[!SetOption MeterCPUPercent FontColor 255,255,255][!Redraw]

[MeterCPUPercent]
UpdateDivider=9
Meter=String
MeasureName=MeasureCPU
FontFace=iFlash 502
FontSize=17
FontColor=255,255,255
X=112
Y=48
StringAlign=CenterCenter
StringStyle=Bold
AntiAlias=1
Text=%1%

[TITLE]
Meter=String
Text=CPU
FontFace=iFlash 502
FontSize=12
StringStyle=Bold
x=104
y=111
FontColor=255,255,255
AutoScale=1
AntiAlias=1