[Variables]
Step=1

[MeasureAnimation]
Measure=CALC
Formula=(( MeasureAnimation + #Step# ) % 17 )
Paused=1
IfCondition=((MeasureAnimation=0)||(MeasureAnimation=16))
IfTrueAction=[!PauseMeasure MeasureAnimation]
DynamicVariables=1

[MeterAnimation]
Meter=BITMAP
MeasureName=MeasureAnimation
BitmapImage=#@#Images\jakeNotes.png
Y=-197
BitmapFrames=17
BitmapExtend=1
MouseOverAction=[!SetVariable Step "1"][!UnpauseMeasure "MeasureAnimation"][Play #@#Sounds\jakestretch.wav]
MouseLeaveAction=[!SetVariable Step "-1"][!UnpauseMeasure "MeasureAnimation"][PlayStop]
LeftMouseUpAction=["C:\Users\markj\Desktop\Sticky Notes.lnk"]


[Rainmeter]
Update=60
MouseOverAction=MouseActionCursorName=Busy
