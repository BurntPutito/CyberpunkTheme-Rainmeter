[Rainmeter]
Update=60
MouseOverAction=MouseActionCursorName=Busy

[Variables]
Step=1

[MeasureAnimation]
Measure=CALC
Formula=(( MeasureAnimation + #Step# ) % 8 )
Paused=1
IfCondition=((MeasureAnimation=0)||(MeasureAnimation=7))
IfTrueAction=[!PauseMeasure MeasureAnimation]
DynamicVariables=1

[MeterAnimation]
Meter=BITMAP
MeasureName=MeasureAnimation
BitmapImage=#@#Images\youtubeANIM.png
BitmapFrames=8
BitmapExtend=1
MouseOverAction=[!SetVariable Step "1"][!UnpauseMeasure "MeasureAnimation"][Play "#@#Sounds\iconselectWAV.wav"][!SetOption Title FontColor 255,255,255,255]
MouseLeaveAction=[!SetVariable Step "-1"][!UnpauseMeasure "MeasureAnimation"][!SetOption Title FontColor 255,255,255,0]
LeftMouseUpAction=["http://www.youtube.com"]

[Title]
Meter=String
Text=YouTube
FontSize=16
FontColor=255,255,255,0
FontFace=iFlash 502	
W=200
X=13
Y=67
StringAlign=Left