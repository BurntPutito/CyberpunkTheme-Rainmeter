[Variables]
BitmapImage0=#@#Images\Off&on.png
BitmapImage1=#@#Images\off.png
BitmapImageIndex=0

[Rainmeter]
Update=500

[MeasureAnimation]
Measure=CALC
Formula=((MeasureAnimation+1)%24)
Paused=1
IfCondition=((MeasureAnimation=0)||(MeasureAnimation=23))
IfTrueAction=[!PauseMeasure MeasureAnimation]

[MeterAnimation]
Meter=BITMAP
MeasureName=MeasureAnimation
BitmapImage=[#BitmapImage[#BitmapImageIndex]]
BitmapFrames=24
BitmapZeroFrame=1
MouseOverAction=[!SetVariable Step "1"][!UnpauseMeasure "MeasureAnimation"][Play "#@#Sounds\blipSelect.wav"][!SetOption "Title" FontColor "255,255,255,255"]
MouseLeaveAction=[!SetVariable Step "-1"][!UnpauseMeasure "MeasureAnimation"][!SetOption "Title" FontColor "255,255,255,0"]
LeftMouseDoubleClickAction=[%windir%\System32\shutdown.exe -s -t 00][!SetVariable BitmapImageIndex (1-#BitmapImageIndex#)][!UpdateMeter *][!SetOption "Title" FontColor "255,255,255,0"][!Redraw]
DynamicVariables=1

[Title]
Meter=String
Text=Shutdown
FontFace=iFlash 502
FontColor=255,255,255,0
FontSize=16
W=200
X=20
Y=5
DynamicVariables=1
AntiAlias=1
ClipString=2